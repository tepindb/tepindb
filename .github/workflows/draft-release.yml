name: Draft release

# Step 1 of the release flow: run the full test suite, and only if everything
# is green, create a draft GitHub Release pinned to this commit. Publishing
# the draft (manual approval in the GitHub UI) creates the v<version> tag and
# triggers release.yml, which builds and attaches binaries, checksums, and
# the SBOM. All artifacts ship from GitHub releases only — see SECURITY.md.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, e.g. 0.1.0 (tag becomes v0.1.0 on publish)'
        required: true

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  draft:
    name: Create release draft
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --draft \
            --generate-notes \
            --title "v${{ inputs.version }}" \
            --target "$GITHUB_SHA"
